name: Release Core

on:
  push:
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: tag
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.tag.outputs.version }}"
          body: |
            ${{ steps.changelog.outputs.body }}

            ---

            ## Using this release

            Update `[tool.uv.sources]` in your `agent` and `orchestrator` repos:

            ```toml
            dooservice-sdk       = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-sdk",       tag = "${{ steps.tag.outputs.version }}" }
            dooservice-models    = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-models",    tag = "${{ steps.tag.outputs.version }}" }
            dooservice-db-agent  = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-db-agent",  tag = "${{ steps.tag.outputs.version }}" }
            dooservice-docker    = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-docker",    tag = "${{ steps.tag.outputs.version }}" }
            dooservice-dns       = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-dns",       tag = "${{ steps.tag.outputs.version }}" }
            dooservice-s3        = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-s3",        tag = "${{ steps.tag.outputs.version }}" }
            dooservice-protocol  = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-protocol",  tag = "${{ steps.tag.outputs.version }}" }
            dooservice-transport = { git = "https://github.com/dooservice/core", subdirectory = "packages/dooservice-transport", tag = "${{ steps.tag.outputs.version }}" }
            ```
