[project]
name = "dooservice-sdk"
version = "0.1.0"
description = "dooservice SDK — services + composition root for CLI, API, and integrations"
requires-python = ">=3.13"
dependencies = [
    "dooservice-db-agent",
    "dooservice-docker",
    "dooservice-dns",
    "dooservice-models",
    "dooservice-protocol",
    "dooservice-s3",
    "docker>=7.1",
    "pygit2>=1.19.2",
    "python-dotenv>=1.0",
    "tomlkit>=0.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooservice_sdk"]

[tool.uv.sources]
dooservice-db-agent = { workspace = true }
dooservice-docker = { workspace = true }
dooservice-dns = { workspace = true }
dooservice-models = { workspace = true }
dooservice-protocol = { workspace = true }
dooservice-s3 = { workspace = true }
