[project]
name = "dooservice-dns"
version = "0.1.0"
description = "DNS management and verification (Cloudflare + CNAME resolver)"
requires-python = ">=3.13"
dependencies = [
    "dooservice-models",
    "httpx>=0.28",
    "dnspython>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooservice_dns"]

[tool.uv.sources]
dooservice-models = { workspace = true }
