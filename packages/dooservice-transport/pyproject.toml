[project]
name = "dooservice-transport"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "nats-py>=2.9",
    "msgspec>=0.21",
    "structlog>=25",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooservice_transport"]
