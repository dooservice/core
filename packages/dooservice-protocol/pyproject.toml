[project]
name = "dooservice-protocol"
version = "0.1.0"
description = "Shared protocol types for Agent ↔ Orchestrator communication"
requires-python = ">=3.13"
dependencies = [
    "msgspec>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooservice_protocol"]
