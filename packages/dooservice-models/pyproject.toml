[project]
name = "dooservice-models"
version = "0.1.0"
description = "Domain models and types for dooservice (new architecture)"
requires-python = ">=3.13"
dependencies = [
    "msgspec>=0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooservice_models"]
