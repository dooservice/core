[project]
name = "dooservice-db-agent"
version = "0.1.0"
description = "Agent database layer (new architecture) — Piccolo ORM + aiosqlite"
requires-python = ">=3.13"
dependencies = [
    "dooservice-models",
    "msgspec>=0.21",
    "tortoise-orm>=1.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/dooservice_db_agent"]

[tool.uv.sources]
dooservice-models = { workspace = true }
